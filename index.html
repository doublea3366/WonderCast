<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>WonderCast — Screen-Free Audio Learning for Curious Kids</title>
    <meta name="description" content="WonderCast turns any topic into a personalized, age-appropriate audio story or lesson for your child. Screen-free learning for car rides, bedtime, and everyday curiosity." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://wonder-cast.vercel.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wonder-cast.vercel.app/" />
    <meta property="og:title" content="WonderCast — Screen-Free Audio Learning for Curious Kids" />
    <meta property="og:description" content="Turn any topic into a personalized audio story or lesson for your child. Made for car rides, bedtime, and everyday curiosity. Powered by AI, safe for kids." />
    <meta property="og:image" content="https://wonder-cast.vercel.app/favicon.png" />
    <meta property="og:site_name" content="WonderCast" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WonderCast — Screen-Free Audio Learning for Curious Kids" />
    <meta name="twitter:description" content="Turn any topic into a personalized audio story or lesson for your child. Made for car rides, bedtime, and everyday curiosity." />
    <meta name="twitter:image" content="https://wonder-cast.vercel.app/favicon.png" />

    <!-- PWA / web app manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#FCE7CF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WonderCast" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "WonderCast",
      "url": "https://wonder-cast.vercel.app/",
      "description": "WonderCast creates personalized, age-appropriate audio stories and lessons for children. Parents choose the topic, age group, and format — WonderCast generates a safe, engaging audio episode instantly.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "audience": {
        "@type": "PeopleAudience",
        "suggestedMinAge": 3,
        "suggestedMaxAge": 16
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

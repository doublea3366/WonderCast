  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Static fallback for non-JS crawlers and AEO -->
    <noscript>
      <main style="font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; color: #1B203A;">
        <header>
          <h1>WonderCast — Screen-Free Audio Learning for Curious Kids</h1>
          <p>WonderCast creates personalised, age-appropriate audio stories and lessons for children aged 3 to 16. Parents type any topic, choose an age band, and WonderCast generates a brand new audio episode in under a minute — ready to play anywhere, with no screen required.</p>
        </header>

        <section>
          <h2>How WonderCast Works</h2>
          <ol>
            <li><strong>Choose your child's age and topic</strong> — Select an age band from 3–4 up to 15–16. WonderCast automatically sets the right vocabulary, length, and tone. Then type any topic your child is curious about.</li>
            <li><strong>Review the AI-generated script</strong> — Claude AI writes a fact-aware, age-appropriate script. Preview it, regenerate it, or adjust settings before generating audio.</li>
            <li><strong>Listen anywhere, screen-free</strong> — ElevenLabs converts the script to natural audio with a voice matched to the situation. Perfect for car rides, bedtime, and school help.</li>
          </ol>
        </section>

        <section>
          <h2>Why WonderCast</h2>
          <ul>
            <li><strong>Screen-free learning</strong> — Audio-only means no screen time. Kids listen and imagine rather than passively watching.</li>
            <li><strong>Child-safe by design</strong> — Every topic passes age-appropriate content filters. Sensitive or explicit topics are blocked automatically.</li>
            <li><strong>Truly personalised</strong> — Not a pre-made library. Every episode is generated fresh for your child's exact age, curiosity, and the moment you're in.</li>
            <li><strong>Ready in seconds</strong> — No waiting. Type a topic, press create, and your child has a brand new audio episode.</li>
          </ul>
        </section>

        <section>
          <h2>Who WonderCast Is For</h2>
          <ul>
            <li><strong>Ages 3–6 (Early learners)</strong> — Short, warm stories with gentle language. Ideal for bedtime and morning car rides. Topics include animals, nature, kindness, and imagination.</li>
            <li><strong>Ages 7–10 (Curious explorers)</strong> — Longer adventures and fun lessons on history, science, and how things work.</li>
            <li><strong>Ages 11–16 (Independent thinkers)</strong> — In-depth lessons on complex topics. Geography, biology, study help, current events, and more.</li>
            <li><strong>Car rides</strong> — Engaging, upbeat episodes that hold attention on the go without screens.</li>
            <li><strong>Bedtime</strong> — Calm, soothing stories that ease children to sleep while feeding their curiosity.</li>
            <li><strong>School help</strong> — Clear explanations of school topics at exactly the right level for your child's age.</li>
          </ul>
        </section>

        <section>
          <h2>Frequently Asked Questions</h2>
          <dl>
            <dt><strong>Is WonderCast safe for young children?</strong></dt>
            <dd>Yes. WonderCast is built with child safety as the foundation. Every topic is checked against a child-safe content filter. Age-appropriate language is enforced automatically. Sensitive, violent, or explicit topics are blocked entirely.</dd>

            <dt><strong>What age group is WonderCast for?</strong></dt>
            <dd>WonderCast is designed for children aged 3 to 16. Choose an age band and WonderCast adjusts vocabulary, length, tone, and voice style automatically.</dd>

            <dt><strong>How does WonderCast generate audio?</strong></dt>
            <dd>WonderCast uses Claude AI to write a personalised script, then ElevenLabs to convert it to natural-sounding audio. The full process takes about 30–60 seconds.</dd>

            <dt><strong>Can I use WonderCast for school topics?</strong></dt>
            <dd>Absolutely. Type any school topic and WonderCast generates a clear explanation at the right level for your child's age. Great for reinforcing classroom learning.</dd>

            <dt><strong>How is WonderCast different from audiobooks or podcasts?</strong></dt>
            <dd>Audiobooks and podcasts are pre-made. WonderCast generates a brand new episode for your specific child, on any topic, at their exact age level, in the right format for the moment.</dd>

            <dt><strong>What topics can WonderCast cover?</strong></dt>
            <dd>Almost any age-appropriate topic — science, history, nature, maths, emotions, travel, animals, space, how things work, and more. Topics that are too complex are flagged with a suggestion to simplify.</dd>

            <dt><strong>Is WonderCast free?</strong></dt>
            <dd>WonderCast is currently free to use. Create an episode by choosing your child's age, typing a topic, and pressing Create Audio.</dd>
          </dl>
        </section>

        <footer>
          <p>© WonderCast. Screen-free, AI-powered audio learning for curious kids aged 3–16.</p>
        </footer>
      </main>
